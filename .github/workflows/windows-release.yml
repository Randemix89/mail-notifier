name: Build Windows EXE (Release)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean --windowed --name "MailNotifier" app_tk.py

      - name: Zip dist folder
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "MailNotifier-$tag-windows.zip"
          Compress-Archive -Path "dist\MailNotifier\*" -DestinationPath $zip -Force
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            dist/MailNotifier/MailNotifier.exe
          generate_release_notes: true

